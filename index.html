    .arr-up {

      width: 0; height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-bottom: 9px solid #e8ddd0;
    }
    .arr-up::after {
      content: ''; position: absolute; top: 2px; left: -7px;
      width: 0; height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-bottom: 8px solid rgba(255,253,249,0.96);
    }
    .arr-down {
      position: absolute; bottom: -9px; left: 24px;
      width: 0; height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 9px solid #e8ddd0;
    }
    .arr-down::after {
      content: ''; position: absolute; bottom: 2px; left: -7px;
      width: 0; height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;

      font-size: 13px; font-weight: 700; text-decoration: none;

  </style>

  function L() { return TX[LANG]; }

  let curStep = 0;
  let frameBlocked = false;

  // Approximate positions of elements in the real app
  // These are percentage-based estimates â€” adjust if needed
  const POSITIONS = {
    'trending':    { top: '22%', left: '5%',  width: '90%', height: '14%' },
    'ask-card':    { top: '58%', left: '5%',  width: '90%', height: '9%'  },
    'about-card':  { top: '78%', left: '5%',  width: '90%', height: '9%'  },
    'post':        { top: '18%', left: '5%',  width: '90%', height: '40%' },
    'actions':     { top: '54%', left: '5%',  width: '90%', height: '8%'  },
  };

  function vw() { return window.innerWidth; }
  function vh() { return window.innerHeight; }

  function pxFromPct(pct, total) {
    return parseFloat(pct) / 100 * total;
  }

  function showOverlay(show) {
    document.getElementById('overlay').style.display = show ? 'block' : 'none';
  }

  function setSpotlight(key) {
    const sp = document.getElementById('spotlight');
    if (!key) { sp.style.display = 'none'; return; }
    const p = POSITIONS[key];
    if (!p) { sp.style.display = 'none'; return; }
    const t = pxFromPct(p.top, vh());
    const l = pxFromPct(p.left, vw());
    const w = pxFromPct(p.width, vw());
    const h = pxFromPct(p.height, vh());
    sp.style.cssText = `display:block;top:${t}px;left:${l}px;width:${w}px;height:${h}px;border-radius:14px`;
  }

  function setTooltip(step, stepNum, totalSteps) {
    const d = L();
    const tt = document.getElementById('tooltip');

    // Build avatar html if needed
    let body = step.body;
    if (step.avs) {
      const avColors = [['#fde8d8','#e8a87c'],['#d8e8f8','#a87ce8'],['#e8f5e8','#7ccc9a']];
      const avHtml = `<div class='av3'>${[0,1,2].map(i=>`<div class='avc'><div class='avring'><img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><circle cx='20' cy='20' r='20' fill='${encodeURIComponent(avColors[i][0])}'></circle><circle cx='20' cy='15' r='7' fill='${encodeURIComponent(avColors[i][1])}'></circle><ellipse cx='20' cy='35' rx='12' ry='8' fill='${encodeURIComponent(avColors[i][1])}'></ellipse></svg>" alt="${d.avNames[i]}"></div><div class='avn'>${d.avNames[i]}</div><div class='avs'>${d.avSpec[i]}</div></div>`).join('')}</div>`;
      body = body + avHtml;
    }

    // Build dots
    let dots = '<div class="tt-dots">';
    for (let j = 0; j < totalSteps; j++) {
      dots += `<div class="tdot${j === stepNum ? ' on' : ''}"></div>`;
    }
    dots += '</div>';

    // Arrow
    let arrowHtml = '';
    if (step.arrow === 'up') arrowHtml = '<div class="arr-up"></div>';
    else if (step.arrow === 'down') arrowHtml = '<div class="arr-down"></div>';

    tt.innerHTML = `${arrowHtml}
      <div class="tt-tag">${d.step} ${stepNum + 1} ${d.of} ${totalSteps}</div>
      <div class="tt-title">${step.title}</div>
      <div class="tt-body">${body}</div>
      <div class="tt-btns">${dots}
        <button class="btn-skip" onclick="skipAll()">${d.skip}</button>
        <button class="btn-next" onclick="nextStep()">${step.btn}</button>
      </div>`;

    // Position tooltip
    tt.style.cssText = 'display:block;position:fixed;z-index:20;background:rgba(255,253,249,0.96);border:1px solid #e8ddd0;border-radius:18px;padding:16px 18px 14px;width:280px;font-family:Nunito,sans-serif;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 8px 32px rgba(0,0,0,0.15)';

    const margin = 20;
    const ttW = 280;

    switch (step.pos) {
      case 'center':
        tt.style.top = '50%';
        tt.style.left = '50%';
        tt.style.transform = 'translate(-50%, -50%)';
        break;
      case 'below-trending': {
        const p = POSITIONS['trending'];
        const t = pxFromPct(p.top, vh()) + pxFromPct(p.height, vh()) + 12;
        tt.style.top = t + 'px';
        tt.style.left = margin + 'px';
        tt.style.transform = '';
        break;
      }
      case 'below-ask': {
        const p = POSITIONS['ask-card'];
        const t = pxFromPct(p.top, vh()) + pxFromPct(p.height, vh()) + 12;
        tt.style.top = t + 'px';
        tt.style.left = margin + 'px';
        tt.style.transform = '';
        break;
      }
      case 'above-about': {
        const p = POSITIONS['about-card'];
        requestAnimationFrame(() => {
          const h = tt.offsetHeight || 120;
          tt.style.top = (pxFromPct(p.top, vh()) - h - 14) + 'px';
          tt.style.left = margin + 'px';
          tt.style.transform = '';
        });
        break;
      }
      case 'below-post': {
        const p = POSITIONS['post'];
        const t = pxFromPct(p.top, vh()) + pxFromPct(p.height, vh()) + 12;
        tt.style.top = t + 'px';
        tt.style.left = margin + 'px';
        tt.style.transform = '';
        break;
      }
      case 'above-actions': {
        const p = POSITIONS['actions'];
        requestAnimationFrame(() => {
          const h = tt.offsetHeight || 160;
          tt.style.top = (pxFromPct(p.top, vh()) - h - 14) + 'px';
          tt.style.left = margin + 'px';
          tt.style.transform = '';
        });
        break;
      }
    }
  }

  const HOME_TOTAL = 5;
  const COMM_TOTAL = 2;
  const GRAND_TOTAL = HOME_TOTAL + COMM_TOTAL;

  let phase = 'home'; // 'home' | 'comm'

  function showStep(i) {
    const d = L();
    const steps = phase === 'home' ? d.steps : d.commSteps;
    const globalStep = phase === 'home' ? i : HOME_TOTAL + i;
    const s = steps[i];

    showOverlay(true);
    setSpotlight(s.spotlight);
    setTooltip(s, globalStep, GRAND_TOTAL);
    curStep = i;
  }

  function nextStep() {
    const d = L();
    const steps = phase === 'home' ? d.steps : d.commSteps;
    if (curStep >= steps.length - 1) {
      if (phase === 'home') {
        // Done with home steps
        skipAll();
        showHint();
      } else {
        skipAll();
      }
      return;
    }
    showStep(curStep + 1);
  }

  function showHint() {
    const d = L();
    let h = document.getElementById('hint-bubble');
    if (!h) {
      h = document.createElement('div');
      h.id = 'hint-bubble';
      h.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(255,253,249,0.97);border:1px solid #e8ddd0;border-radius:16px;padding:12px 18px;text-align:center;z-index:25;font-family:Nunito,sans-serif;width:240px;backdrop-filter:blur(6px);box-shadow:0 4px 20px rgba(0,0,0,.1)';
      document.body.appendChild(h);
    }
    const msg = LANG === 'zh' ? 'å‰å¾€ Community é¡µé¢ç»§ç»­ â†’' : 'Go to Community page to continue â†’';
    const btnTxt = LANG === 'zh' ? 'å‰å¾€ Community ðŸ‘¥' : 'Go to Community ðŸ‘¥';
    h.innerHTML = `<div style="font-size:11px;color:#6b5a4e;margin-bottom:8px">${msg}</div>
      <button onclick="startCommPhase()" style="background:#5a7a62;color:#fff;border:none;border-radius:13px;padding:7px 16px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:Nunito,sans-serif">${btnTxt}</button>`;
  }

  function startCommPhase() {
    const h = document.getElementById('hint-bubble');
    if (h) h.remove();
    phase = 'comm';
    showStep(0);
  }

  function skipAll() {
    showOverlay(false);
    document.getElementById('spotlight').style.display = 'none';
    document.getElementById('tooltip').style.display = 'none';
    const h = document.getElementById('hint-bubble');
    if (h) h.remove();
  }

  function setLang(lang, btn) {
    LANG = lang;
    document.querySelectorAll('.ctrl-btn:not(.replay)').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    document.getElementById('btn-replay').textContent = L().replay;
    replayAll();
  }

  function replayAll() {
    const h = document.getElementById('hint-bubble');
    if (h) h.remove();
    phase = 'home';
    showStep(0);
  }

  // â”€â”€ Iframe load handling â”€â”€
  function onFrameLoad() {
    // Give it a moment then start tutorial
    setTimeout(() => {
      replayAll();
    }, 1200);
  }

  function showBlocked() {
    frameBlocked = true;
    document.getElementById('blocked-msg').style.display = 'flex';
  }

  // Check if iframe loaded after 5 seconds
  setTimeout(() => {
    const frame = document.getElementById('app-frame');
    try {
      // If we can access contentDocument, it loaded
      if (!frame.contentDocument && !frameBlocked) {
        showBlocked();
      }
    } catch(e) {
      // Cross-origin â€” frame loaded but we can't access DOM (expected)
      // This is actually fine â€” tutorial still overlays
      replayAll();
    }
  }, 5000);

  // Update replay button text
  document.getElementById('btn-replay').textContent = L().replay;
</script>
</body>
</html>
